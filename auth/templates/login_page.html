{% extends "base.html" %}

{% block title %}Log In · The Personal Book Vault{% endblock %}

{% block body %}
<div class="auth-shell">
    <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="subtitle">Log in to see your reading list.</p>

        <form method="POST" action="{{ url_for('auth.user_login') }}" novalidate>

            <div class="field">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    autocomplete="username"
                    required
                    autofocus>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Log In</button>

        </form>

        <p class="switch-link">
            Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
