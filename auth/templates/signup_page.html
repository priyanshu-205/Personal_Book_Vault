{% extends "base.html" %}

{% block title %}Sign Up · The Personal Book Vault{% endblock %}

{% block body %}
<div class="auth-shell">
    <div class="auth-card">
        <h1>Create your account</h1>
        <p class="subtitle">Start tracking what you read.</p>

        <form method="POST" action="{{ url_for('auth.signup') }}" novalidate>

            <div class="field">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    autocomplete="username"
                    required
                    autofocus>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    autocomplete="email">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="new-password"
                    required
                    minlength="6">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Sign Up</button>

        </form>

        <p class="switch-link">
            Already have an account? <a href="{{ url_for('auth.user_login') }}">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
