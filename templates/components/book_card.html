<div class="book-card">

    <a href="{{ url_for('books.book_detail', book_id=book.book_id) }}">

        <div class="cover">

            {% if book.cover_image %}
                <img src="{{ url_for('static',filename='covers/' + book.cover_image) }}">
            {% else %}
                📖
            {% endif %}

        </div>

    </a>

    <h3>{{ book.title }}</h3>
    <p>{{ book.author }}</p>

    <span class="status {{ book.status}}">
        {{ book.status }}
    </span>

</div>
