<div class="book-card">

    <a href="{{ url_for('books.book_detail', book_id=book.book.book_id) }}">

        <div class="cover">

            {% if book.book.cover_image %}
                <img
                    src="{{ url_for('static', filename='covers/' + book.book.cover_image) }}"
                    alt="Cover of {{ book.book.title }}"
                    loading="lazy">
            {% else %}
                <img
                    src="{{ url_for('static', filename='covers/default_book.png') }}"
                    alt="No cover available for {{ book.book.title }}"
                    loading="lazy">
            {% endif %}

        </div>

    </a>

    <div class="book-info">

        <a href="{{ url_for('books.book_detail', book_id=book.book.book_id) }}">
            <h3>{{ book.book.title }}</h3>
        </a>

        <p>{{ book.book.author }}</p>

        {% if book.book.genre %}
            <p class="genre">{{ book.book.genre }}</p>
        {% endif %}

        <span class="status {{ book.status|lower|replace(' ', '-') }}">
            {{ book.status }}
        </span>

    </div>

</div>
