{% extends "base.html" %}
    
{% block title %} Home {% endblock %}

{% block body %} 
<div class="">
<h1> Your Books</h1>
<form method="POST" action="{{url_for('books.home')}}" >
<label for ="title" >Title</label> 
<input type ="text" id="title" name="title" placeholder="Enter Book Title" required><br>
<label for ="author" >Author</label> 
<input type ="author" id="author" name="author" placeholder="Enter Author Name" required><br>
<label for ="genre" >Genre</label> 
<input type ="genre" id="genre" name="genre" placeholder="Enter Author Name" required><br>
<input type="submit" value="Login">

</form>

    {% for book in books %}
    
    <a href="{{ url_for('books.book_detail',book_id=book.id) }}">
        <h4>book.title</h4>
    </a>
    {% endfor %}
</div>
    {% endblock %}
